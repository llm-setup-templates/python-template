version: 2
updates:
  # Python dependencies in examples archetype (main pyproject target)
  - package-ecosystem: "pip"
    directory: "/examples"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
